<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Closira — Business Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#0a0c10;
  --surface:#13161e;
  --surface2:#1c2030;
  --border:#252a38;
  --accent:#00e5a0;
  --accent2:#3b82f6;
  --warn:#f59e0b;
  --danger:#ef4444;
  --text:#e8edf5;
  --muted:#6b7485;
  --wa:#25d366;
  --em:#3b82f6;
  --call:#f59e0b;
  --new:#3b82f6;
  --qualified:#00e5a0;
  --escalated:#ef4444;
  --font-head:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}

/* ── screens ── */
.screen{display:none;flex-direction:column;min-height:calc(100vh - 64px);padding-bottom:80px;animation:fadeUp .25s ease}
.screen.active{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── nav ── */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;z-index:100;height:64px;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;background:none;border:none;cursor:pointer;
  font-family:var(--font-body);font-size:10px;color:var(--muted);
  transition:color .2s;padding:8px 0;
}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:20px;height:20px}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--danger);margin-top:-8px;margin-left:10px}

/* ── header ── */
.page-header{
  padding:52px 20px 16px;
  position:sticky;top:0;background:var(--bg);z-index:10;
  border-bottom:1px solid var(--border);
}
.page-header h1{font-family:var(--font-head);font-size:22px;font-weight:800;letter-spacing:-.02em}
.page-header p{font-size:13px;color:var(--muted);margin-top:2px}

/* ── cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin:0 16px 12px}
.card-title{font-family:var(--font-head);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}

/* ── stat grid ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:14px;position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
}
.stat-card.blue::before{background:var(--accent2)}
.stat-card.green::before{background:var(--accent)}
.stat-card.red::before{background:var(--danger)}
.stat-card.amber::before{background:var(--warn)}
.stat-label{font-size:11px;color:var(--muted);font-family:var(--font-head);text-transform:uppercase;letter-spacing:.08em}
.stat-value{font-family:var(--font-head);font-size:32px;font-weight:800;margin:4px 0 0;line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* ── activity feed ── */
.feed-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 16px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .15s;
}
.feed-item:hover{background:var(--surface2)}
.feed-avatar{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;font-family:var(--font-head);
  flex-shrink:0;
}
.feed-content{flex:1;min-width:0}
.feed-name{font-size:13px;font-weight:500;margin-bottom:2px}
.feed-msg{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feed-time{font-size:11px;color:var(--muted);flex-shrink:0}

/* ── badges ── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;
  font-family:var(--font-head);letter-spacing:.03em;
}
.badge-wa{background:rgba(37,211,102,.15);color:var(--wa)}
.badge-em{background:rgba(59,130,246,.15);color:var(--em)}
.badge-call{background:rgba(245,158,11,.15);color:var(--call)}
.badge-new{background:rgba(59,130,246,.15);color:var(--new)}
.badge-qualified{background:rgba(0,229,160,.15);color:var(--qualified)}
.badge-escalated{background:rgba(239,68,68,.15);color:var(--danger)}
.badge-high{background:rgba(239,68,68,.2);color:var(--danger)}
.badge-medium{background:rgba(245,158,11,.2);color:var(--warn)}

/* ── lead list ── */
.lead-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;margin:0 16px 10px;cursor:pointer;
  transition:border-color .2s,transform .15s;
}
.lead-card:hover{border-color:var(--accent);transform:translateX(2px)}
.lead-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.lead-name{font-size:14px;font-weight:500}
.lead-time{font-size:11px;color:var(--muted)}
.lead-bottom{display:flex;align-items:center;gap:8px}
.lead-msg{font-size:12px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── escalation card ── */
.esc-card{
  background:var(--surface);border:1px solid rgba(239,68,68,.3);border-radius:12px;
  padding:14px 16px;margin:0 16px 10px;
}
.esc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.esc-name{font-size:14px;font-weight:500}
.esc-reason{font-size:12px;color:var(--muted);margin:6px 0 10px}
.esc-bottom{display:flex;align-items:center;justify-content:space-between}
.resolve-btn{
  background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);
  color:var(--accent);font-family:var(--font-head);font-size:11px;font-weight:700;
  padding:6px 14px;border-radius:6px;cursor:pointer;letter-spacing:.05em;
  transition:background .2s;
}
.resolve-btn:hover{background:rgba(0,229,160,.2)}
.resolve-btn.resolved{background:rgba(107,116,133,.1);border-color:var(--border);color:var(--muted);cursor:default}

/* ── followup card ── */
.fu-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;margin:0 16px 10px;
}
.fu-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.fu-name{font-size:14px;font-weight:500}
.fu-due{font-size:11px;color:var(--warn)}
.fu-msg{font-size:12px;color:var(--muted);margin-bottom:10px}
.done-btn{
  background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);
  color:var(--accent2);font-family:var(--font-head);font-size:11px;font-weight:700;
  padding:6px 14px;border-radius:6px;cursor:pointer;letter-spacing:.05em;
  transition:all .2s;
}
.done-btn.done{background:rgba(0,229,160,.1);border-color:rgba(0,229,160,.3);color:var(--accent)}

/* ── conversation detail ── */
#screen-detail{display:none;flex-direction:column;min-height:100vh;animation:fadeUp .25s ease}
#screen-detail.active{display:flex}
.detail-header{
  padding:52px 20px 16px;
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.back-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:20px;padding:4px}
.detail-info{flex:1}
.detail-name{font-family:var(--font-head);font-size:16px;font-weight:700}
.detail-sub{font-size:12px;color:var(--muted);margin-top:2px;display:flex;gap:8px;align-items:center}
.msg-thread{flex:1;padding:16px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.msg-bubble{max-width:80%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5}
.msg-in{background:var(--surface2);border-bottom-left-radius:4px;align-self:flex-start}
.msg-out{background:rgba(0,229,160,.12);border:1px solid rgba(0,229,160,.2);border-bottom-right-radius:4px;align-self:flex-end;color:var(--accent)}
.msg-time{font-size:10px;color:var(--muted);margin-top:4px}
.sop-label{
  background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);
  border-radius:8px;padding:10px 14px;margin:0 16px 10px;
}
.sop-label-title{font-size:10px;font-family:var(--font-head);color:var(--accent2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.sop-label-val{font-size:13px;color:var(--text)}
.timeline{padding:16px}
.timeline-title{font-family:var(--font-head);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.tl-item{display:flex;gap:10px;margin-bottom:10px}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.tl-event{font-size:12px;font-weight:500}
.tl-time{font-size:11px;color:var(--muted)}

/* ── quick actions ── */
.quick-actions{display:flex;gap:10px;padding:0 16px 16px;overflow-x:auto;scrollbar-width:none}
.qa-btn{
  flex-shrink:0;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;cursor:pointer;font-family:var(--font-head);
  font-size:12px;font-weight:600;color:var(--text);transition:border-color .2s;
  display:flex;align-items:center;gap:6px;
}
.qa-btn:hover{border-color:var(--accent)}

/* ── empty state ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-family:var(--font-head);font-size:16px;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:13px}

/* ── search ── */
.search-bar{
  margin:12px 16px;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;display:flex;align-items:center;gap:8px;padding:10px 14px;
}
.search-bar input{
  background:none;border:none;outline:none;color:var(--text);
  font-family:var(--font-body);font-size:14px;flex:1;
}
.search-bar input::placeholder{color:var(--muted)}

.section-label{font-family:var(--font-head);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:8px 16px 4px}

.greeting{font-size:13px;color:var(--muted);font-weight:400}
.greeting strong{color:var(--accent);font-family:var(--font-head)}
</style>
</head>
<body>

<!-- ══════════════ HOME ══════════════ -->
<div id="screen-home" class="screen active">
  <div class="page-header">
    <p class="greeting">Good morning, <strong>Tarika ↗</strong></p>
    <h1>Dashboard</h1>
  </div>

  <div class="stat-grid">
    <div class="stat-card blue">
      <div class="stat-label">Leads Today</div>
      <div class="stat-value">24</div>
      <div class="stat-sub">↑ 6 from yesterday</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">Missed</div>
      <div class="stat-value">3</div>
      <div class="stat-sub">Needs attention</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-label">Escalations</div>
      <div class="stat-value">5</div>
      <div class="stat-sub">2 high priority</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Follow-ups</div>
      <div class="stat-value">8</div>
      <div class="stat-sub">Due today</div>
    </div>
  </div>

  <div class="quick-actions">
    <button class="qa-btn" onclick="showTab('leads')">📋 View Leads</button>
    <button class="qa-btn" onclick="showTab('escalations')">🚨 Escalations</button>
    <button class="qa-btn" onclick="showTab('followups')">📅 Follow-ups</button>
  </div>

  <div class="section-label">Recent Activity</div>
  <div id="activity-feed"></div>
</div>

<!-- ══════════════ LEADS ══════════════ -->
<div id="screen-leads" class="screen">
  <div class="page-header">
    <h1>Leads</h1>
    <p>24 inbound today</p>
  </div>
  <div class="search-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;color:var(--muted)"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="Search leads..." oninput="filterLeads(this.value)"/>
  </div>
  <div id="leads-list"></div>
</div>

<!-- ══════════════ ESCALATIONS ══════════════ -->
<div id="screen-escalations" class="screen">
  <div class="page-header">
    <h1>Escalations</h1>
    <p>5 active alerts</p>
  </div>
  <div id="escalations-list"></div>
</div>

<!-- ══════════════ FOLLOW-UPS ══════════════ -->
<div id="screen-followups" class="screen">
  <div class="page-header">
    <h1>Follow-ups</h1>
    <p>8 due today</p>
  </div>
  <div id="followups-list"></div>
</div>

<!-- ══════════════ CONVERSATION DETAIL ══════════════ -->
<div id="screen-detail">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <div class="detail-info">
      <div class="detail-name" id="detail-name"></div>
      <div class="detail-sub" id="detail-sub"></div>
    </div>
  </div>

  <div class="msg-thread" id="msg-thread"></div>

  <div class="sop-label">
    <div class="sop-label-title">🤖 SOP Match</div>
    <div class="sop-label-val" id="detail-sop"></div>
  </div>

  <div class="sop-label" style="background:rgba(0,229,160,.05);border-color:rgba(0,229,160,.15)">
    <div class="sop-label-title" style="color:var(--accent)">✦ AI Summary</div>
    <div class="sop-label-val" id="detail-summary"></div>
  </div>

  <div class="timeline">
    <div class="timeline-title">Status Timeline</div>
    <div id="detail-timeline"></div>
  </div>
</div>

<!-- ══════════════ BOTTOM NAV ══════════════ -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="showTab('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </button>
  <button class="nav-btn" id="nav-leads" onclick="showTab('leads')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Leads
  </button>
  <button class="nav-btn" id="nav-escalations" onclick="showTab('escalations')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    Escalations
    <div class="nav-dot"></div>
  </button>
  <button class="nav-btn" id="nav-followups" onclick="showTab('followups')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Follow-ups
  </button>
</nav>

<script>
// ══ MOCK DATA ══
const leads = [
  {id:"enq_001",customer:"Sarah M.",channel:"whatsapp",status:"escalated",message:"I'm really unhappy with the service I received yesterday",receivedAt:"2026-05-25T09:14:00Z",sop:"complaint",summary:"Customer expressed dissatisfaction with service quality. Requested manager callback.",timeline:[{event:"Enquiry received",time:"09:14"},{event:"SOP matched: complaint",time:"09:14"},{event:"Escalated to human agent",time:"09:15"}]},
  {id:"enq_002",customer:"Rahul K.",channel:"email",status:"qualified",message:"Can you tell me the pricing for your premium plan?",receivedAt:"2026-05-25T09:32:00Z",sop:"pricing_question",summary:"Customer enquiring about premium plan costs. High purchase intent detected.",timeline:[{event:"Enquiry received",time:"09:32"},{event:"SOP matched: pricing_question",time:"09:32"},{event:"Auto-response sent",time:"09:32"}]},
  {id:"enq_003",customer:"Priya S.",channel:"call",status:"new",message:"I'd like to book an appointment for next Tuesday",receivedAt:"2026-05-25T10:01:00Z",sop:"booking_enquiry",summary:"Customer wants to schedule appointment. Preferred time: next Tuesday.",timeline:[{event:"Call received",time:"10:01"},{event:"SOP matched: booking_enquiry",time:"10:01"}]},
  {id:"enq_004",customer:"Amit D.",channel:"whatsapp",status:"qualified",message:"What are your weekend timings?",receivedAt:"2026-05-25T10:22:00Z",sop:"after_hours",summary:"Customer asking about weekend availability. Auto-response sent with hours.",timeline:[{event:"Enquiry received",time:"10:22"},{event:"SOP matched: after_hours",time:"10:22"}]},
  {id:"enq_005",customer:"Neha R.",channel:"email",status:"new",message:"Can you give me more information about your services?",receivedAt:"2026-05-25T10:45:00Z",sop:"general_info",summary:"New lead requesting general service information. First contact.",timeline:[{event:"Enquiry received",time:"10:45"},{event:"SOP matched: general_info",time:"10:46"}]},
  {id:"enq_006",customer:"Vikram P.",channel:"whatsapp",status:"escalated",message:"This is completely unacceptable, I want a refund now",receivedAt:"2026-05-25T11:03:00Z",sop:"complaint",summary:"Urgent complaint. Customer demanding refund. High priority escalation.",timeline:[{event:"Enquiry received",time:"11:03"},{event:"Auto-escalated: complaint",time:"11:03"}]},
  {id:"enq_007",customer:"Ananya T.",channel:"call",status:"qualified",message:"I want to schedule a demo for my team of 10 people",receivedAt:"2026-05-25T11:30:00Z",sop:"booking_enquiry",summary:"B2B opportunity. Team of 10. High-value demo request.",timeline:[{event:"Call received",time:"11:30"},{event:"SOP matched: booking_enquiry",time:"11:30"}]},
];

const escalations = [
  {id:"esc_001",customer:"Sarah M.",channel:"whatsapp",reason:"Customer very unhappy with service — requested manager",time:"09:15",urgency:"high",resolved:false},
  {id:"esc_002",customer:"Vikram P.",channel:"whatsapp",reason:"Refund demand — needs immediate attention",time:"11:03",urgency:"high",resolved:false},
  {id:"esc_003",customer:"Rohit B.",channel:"email",reason:"Billing discrepancy of Rs.4,500 reported",time:"08:45",urgency:"medium",resolved:false},
  {id:"esc_004",customer:"Sunita L.",channel:"call",reason:"Technical issue unresolved for 3 days",time:"07:30",urgency:"medium",resolved:false},
  {id:"esc_005",customer:"Deepak M.",channel:"whatsapp",reason:"No SOP matched for complex legal query",time:"10:50",urgency:"medium",resolved:false},
];

const followups = [
  {id:"fu_001",customer:"Rahul K.",due:"11:00 AM",message:"Following up on premium plan pricing — are you ready to proceed?",done:false,channel:"email"},
  {id:"fu_002",customer:"Priya S.",due:"12:30 PM",message:"Confirming your appointment for Tuesday 3pm",done:false,channel:"whatsapp"},
  {id:"fu_003",customer:"Ananya T.",due:"01:00 PM",message:"Demo confirmation for your team of 10 — please share preferred slots",done:false,channel:"call"},
  {id:"fu_004",customer:"Mohan V.",due:"02:00 PM",message:"Checking if you received our proposal document",done:true,channel:"email"},
  {id:"fu_005",customer:"Kavya R.",due:"03:30 PM",message:"Following up on your service enquiry from last week",done:false,channel:"whatsapp"},
];

// ── channel badge ──
function channelBadge(ch){
  const map={whatsapp:['badge-wa','💬 WhatsApp'],email:['badge-em','✉ Email'],call:['badge-call','📞 Call']};
  const [cls,label]=map[ch]||['badge-em',ch];
  return `<span class="badge ${cls}">${label}</span>`;
}
function statusBadge(s){
  const map={new:'badge-new',qualified:'badge-qualified',escalated:'badge-escalated',matched:'badge-qualified'};
  return `<span class="badge ${map[s]||'badge-new'}">${s.charAt(0).toUpperCase()+s.slice(1)}</span>`;
}
function timeAgo(iso){
  const d=new Date(iso),now=new Date();
  const diff=Math.round((now-d)/60000);
  if(diff<1)return 'just now';
  if(diff<60)return diff+'m ago';
  return Math.round(diff/60)+'h ago';
}
function avatarColor(name){
  const colors=['#00e5a0','#3b82f6','#f59e0b','#ef4444','#a78bfa','#ec4899'];
  return colors[name.charCodeAt(0)%colors.length];
}

// ── render feed ──
function renderFeed(){
  const el=document.getElementById('activity-feed');
  el.innerHTML=leads.slice(0,5).map(l=>`
    <div class="feed-item" onclick="openDetail('${l.id}')">
      <div class="feed-avatar" style="background:${avatarColor(l.customer)}22;color:${avatarColor(l.customer)}">${l.customer[0]}</div>
      <div class="feed-content">
        <div class="feed-name">${l.customer} ${channelBadge(l.channel)}</div>
        <div class="feed-msg">${l.message}</div>
      </div>
      <div class="feed-time">${timeAgo(l.receivedAt)}</div>
    </div>
  `).join('');
}

// ── render leads ──
function renderLeads(data){
  const el=document.getElementById('leads-list');
  if(!data.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">No leads found</div><div class="empty-sub">Try a different search</div></div>`;return;}
  el.innerHTML=data.map(l=>`
    <div class="lead-card" onclick="openDetail('${l.id}')">
      <div class="lead-top">
        <span class="lead-name">${l.customer}</span>
        <span class="lead-time">${timeAgo(l.receivedAt)}</span>
      </div>
      <div class="lead-bottom">
        ${channelBadge(l.channel)}
        ${statusBadge(l.status)}
        <span class="lead-msg">${l.message}</span>
      </div>
    </div>
  `).join('');
}

function filterLeads(q){
  const filtered=leads.filter(l=>l.customer.toLowerCase().includes(q.toLowerCase())||l.message.toLowerCase().includes(q.toLowerCase()));
  renderLeads(filtered);
}

// ── render escalations ──
function renderEscalations(){
  const el=document.getElementById('escalations-list');
  const active=escalations.filter(e=>!e.resolved);
  if(!active.length){el.innerHTML=`<div class="empty"><div class="empty-icon">✅</div><div class="empty-title">All clear!</div><div class="empty-sub">No active escalations right now</div></div>`;return;}
  el.innerHTML=escalations.map((e,i)=>`
    <div class="esc-card" id="esc-${i}">
      <div class="esc-top">
        <div>
          <div class="esc-name">${e.customer}</div>
          <div style="display:flex;gap:6px;margin-top:4px">${channelBadge(e.channel)}<span class="badge ${e.urgency==='high'?'badge-high':'badge-medium'}">${e.urgency.toUpperCase()}</span></div>
        </div>
        <span style="font-size:11px;color:var(--muted)">${e.time}</span>
      </div>
      <div class="esc-reason">${e.reason}</div>
      <div class="esc-bottom">
        <button class="resolve-btn ${e.resolved?'resolved':''}" onclick="resolveEsc(${i},this)">${e.resolved?'✓ Resolved':'Resolve'}</button>
        <span style="font-size:11px;color:var(--muted)">Tap to resolve</span>
      </div>
    </div>
  `).join('');
}

function resolveEsc(i,btn){
  if(escalations[i].resolved)return;
  escalations[i].resolved=true;
  btn.textContent='✓ Resolved';
  btn.classList.add('resolved');
  document.getElementById('esc-'+i).style.borderColor='var(--border)';
  document.getElementById('esc-'+i).style.opacity='0.6';
}

// ── render followups ──
function renderFollowups(){
  const el=document.getElementById('followups-list');
  el.innerHTML=followups.map((f,i)=>`
    <div class="fu-card" id="fu-${i}" style="${f.done?'opacity:.5':''}">
      <div class="fu-top">
        <span class="fu-name">${f.customer}</span>
        <span class="fu-due">⏰ Due ${f.due}</span>
      </div>
      <div style="margin-bottom:6px">${channelBadge(f.channel)}</div>
      <div class="fu-msg">${f.message}</div>
      <button class="done-btn ${f.done?'done':''}" onclick="markDone(${i},this)">${f.done?'✓ Done':'Mark as Done'}</button>
    </div>
  `).join('');
}

function markDone(i,btn){
  followups[i].done=true;
  btn.textContent='✓ Done';
  btn.classList.add('done');
  document.getElementById('fu-'+i).style.opacity='0.5';
}

// ── conversation detail ──
function openDetail(id){
  const lead=leads.find(l=>l.id===id);
  if(!lead)return;
  document.getElementById('detail-name').textContent=lead.customer;
  document.getElementById('detail-sub').innerHTML=channelBadge(lead.channel)+statusBadge(lead.status);
  document.getElementById('detail-sop').textContent=lead.sop?lead.sop.replace('_',' ').replace(/\b\w/g,c=>c.toUpperCase()):'No SOP matched — escalated';
  document.getElementById('detail-summary').textContent=lead.summary;

  document.getElementById('msg-thread').innerHTML=`
    <div>
      <div class="msg-bubble msg-in">${lead.message}</div>
      <div class="msg-time">${lead.customer} · ${timeAgo(lead.receivedAt)}</div>
    </div>
    ${lead.sop?`<div style="align-self:flex-end">
      <div class="msg-bubble msg-out">Thank you for reaching out! ${lead.sop==='complaint'?'We are sorry to hear this. A manager will contact you within 1 hour.':lead.sop==='pricing_question'?'Our pricing starts from Rs.999. Reply for a custom quote.':lead.sop==='booking_enquiry'?'We will confirm your appointment within 2 hours.':lead.sop==='after_hours'?'We are offline right now. We will respond by 9am tomorrow.':'Here are our service details...'}</div>
      <div class="msg-time" style="text-align:right">Closira AI · just now</div>
    </div>`:''}
  `;

  document.getElementById('detail-timeline').innerHTML=lead.timeline.map(t=>`
    <div class="tl-item">
      <div class="tl-dot"></div>
      <div><div class="tl-event">${t.event}</div><div class="tl-time">${t.time}</div></div>
    </div>
  `).join('');

  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelector('.bottom-nav').style.display='none';
  document.getElementById('screen-detail').classList.add('active');
}

function closeDetail(){
  document.getElementById('screen-detail').classList.remove('active');
  document.querySelector('.bottom-nav').style.display='flex';
  showTab(lastTab||'leads');
}

// ── tab navigation ──
let lastTab='home';
function showTab(tab){
  lastTab=tab;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  document.getElementById('screen-detail').classList.remove('active');
  document.querySelector('.bottom-nav').style.display='flex';
}

// ── init ──
renderFeed();
renderLeads(leads);
renderEscalations();
renderFollowups();
</script>
</body>
</html>
